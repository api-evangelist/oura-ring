          - type: boolean
          - type: 'null'
          title: ''
          description: Flag indicating if the ring was charging.
        in_charger:
          anyOf:
          - type: boolean
          - type: 'null'
          title: ''
          description: Flag indicating if the ring was in charger.
        level:
          type: integer
          title: ''
          description: Ring battery level percentage. These values are within [0, 100].
