      - Ring Battery Level Routes
      summary: Multiple Ring Battery Level Documents
      operationId: Multiple_ring_battery_level_Documents_v2_usercollection_ring_battery_level_get
      parameters:
      - name: start_datetime
        in: query
        required: false
        schema:
