description: Oura is a health-technology company that makes the Oura Ring — a titanium
  smart ring packed with PPG, body-temperature, SpO2, and motion sensors — and the
  Oura App and Oura Cloud platform that turn raw biometrics into daily Sleep, Activity,
  Readiness, Stress, and Resilience scores. The Oura Developer Cloud exposes a v2
  REST API and webhook subscriptions over OAuth 2.0 and Personal Access Tokens, letting
  third-party applications read 50+ health metrics, raw heart-rate and interbeat-interval
  time series, sleep stages, workouts, sessions, user-authored tags, and ring telemetry.
  A parallel /v2/sandbox/usercollection/* surface provides deterministic sample data
  for integration testing.
