- aid: oura-ring:oura-daily-summaries-api
  name: Oura Daily Summaries API
  tags:
  - Activity
  - Cardiovascular Age
  - Daily
  - Health
  - Readiness
  - Resilience
  - Sleep
  - SpO2
  - Stress
  - VO2 Max
  - Wearables
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Per-day scored summaries derived from Oura Ring sensor data — daily_activity,
    daily_sleep, daily_readiness, daily_resilience, daily_stress, daily_spo2, daily_cardiovascular_age,
    and vO2_max. Each document collection supports list with start_date/end_date and
    individual document retrieval by document_id.
- aid: oura-ring:oura-sleep-api
  name: Oura Sleep API
  tags:
  - Health
  - Rest Mode
  - Sleep
  - Sleep Time
  - Wearables
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Detailed sleep period documents from the ring including HRV, respiratory
    rate, sleep stages, and movement plus recommended sleep_time windows and user-defined
    rest_mode_period blocks. Endpoints under /v2/usercollection/sleep, /v2/usercollection/sleep_time,
    and /v2/usercollection/rest_mode_period.
- aid: oura-ring:oura-activity-api
  name: Oura Activity API
  tags:
  - Activity
  - Fitness
  - Health
  - Sessions
  - Wearables
  - Workouts
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Workout, session (meditation/breathwork/reset), and movement data captured
    by the Oura Ring. /v2/usercollection/workout returns auto-detected and manually
    logged workouts; /v2/usercollection/session returns guided sessions with intensity
    and labels.
- aid: oura-ring:oura-heart-rate-api
  name: Oura Heart Rate API
  tags:
  - Health
  - Heart Rate
  - HRV
  - Interbeat Interval
  - Time Series
  - Wearables
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Continuous heart-rate samples and interbeat interval (RR) data captured
    by the Oura Ring. /v2/usercollection/heartrate returns datetime-bounded BPM samples;
    /v2/usercollection/interbeat_interval returns the underlying IBI time series used
    for HRV calculation.
- aid: oura-ring:oura-tags-api
  name: Oura Tags API
  tags:
  - Annotations
  - Enhanced Tags
  - Health
  - Tags
  - Wearables
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: User-authored annotations attached to specific days or events — legacy
    /v2/usercollection/tag and structured /v2/usercollection/enhanced_tag. Tags carry
    custom text, comments, and (for enhanced tags) typed categories like ailment,
    lifestyle, or nutrition.
- aid: oura-ring:oura-ring-api
  name: Oura Ring Configuration API
  tags:
  - Battery
  - Hardware
  - Ring
  - Telemetry
  - Wearables
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Metadata about the Oura Ring hardware itself — color, design, firmware
    version, hardware type, set id, and ring battery level samples — via /v2/usercollection/ring_configuration
    and /v2/usercollection/ring_battery_level.
- aid: oura-ring:oura-webhooks-api
  name: Oura Webhooks API
  tags:
  - Events
  - Notifications
  - Subscriptions
  - Webhooks
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Create, list, renew, update, and delete event subscriptions over /v2/webhook/subscription.
    Each subscription targets a data_type (sleep, activity, readiness, tag, workout,
    session, daily_*, heartrate, etc.) and an event_type (create, update, delete)
    and posts events to a developer-controlled callback URL with HMAC verification.
- aid: oura-ring:oura-sandbox-api
  name: Oura Sandbox API
  tags:
  - Sandbox
  - Sample Data
  - Testing
  - Wearables
  humanURL: https://cloud.ouraring.com/v2/docs
  properties:
  - url: https://cloud.ouraring.com/v2/docs
    type: Documentation
  - url: openapi/oura-api-openapi.yml
    type: OpenAPI
  description: Mirror of the production usercollection endpoints under /v2/sandbox/usercollection/*
    that returns deterministic sample data without requiring a connected ring or real
    user consent. Used for integration testing, demos, and CI.
