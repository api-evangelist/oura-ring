- type: Features
  data:
  - Oura Ring 4 — titanium smart ring with continuous biometric sensing (PPG, body
    temperature, accelerometer, SpO2)
  - 50+ tracked health metrics across sleep, activity, readiness, stress, resilience,
    heart, and women's health
  - Daily Sleep score with sleep stages, latency, efficiency, HRV, respiratory rate,
    and lowest resting heart rate
  - Daily Activity score with movement, inactivity, training frequency, and equivalent
    walking distance
  - Daily Readiness score combining HRV balance, sleep balance, recovery index, and
    body temperature deviation
  - Daily Resilience score capturing long-term stress load and recovery capacity
  - Daily Stress with high/recovered/relaxed/restored minute-level classification
  - SpO2 nighttime monitoring with average and breathing-disturbance index
  - Cardiovascular Age and VO2 Max estimation from continuous heart-rate data
  - Cycle Insights and Period Prediction (women's health)
  - Symptom Radar early-illness detection based on temperature and respiratory deviation
  - Workouts (auto-detected and manual) and Sessions (meditation, breathwork, reset)
  - Tags and Enhanced Tags (typed user annotations — ailment, lifestyle, nutrition,
    etc.)
  - Rest Mode for recovery from illness or injury
  - Sleep Time recommendation window personalized to the user
  - REST API v2 with OAuth 2.0 (8 scopes) and Personal Access Tokens
  - Webhook subscriptions for sleep, activity, readiness, tag, workout, session, daily_*,
    heartrate (create/update/delete)
  - Sandbox endpoint family (/v2/sandbox/usercollection/*) returning deterministic
    sample data for testing
  - 5,000 requests / 5 minutes per access token rate limit
  - Oura Membership ($5.99/month or $69.99/year) unlocks full insights in the Oura
    App
  - Apple Health, Google Health Connect, Strava, Natural Cycles, and other native
    integrations
  - FSA/HSA eligibility on ring purchases in the US
  - Oura for Teams and Oura Health (enterprise wellness)
  - HIPAA-aligned data handling and SOC 2 controls
